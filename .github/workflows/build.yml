name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install @bubblewrap/core

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'BWEOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          BWEOF

      - name: Build AAB
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: node build.js

      - name: Find output files
        run: find . -name "*.aab" -o -name "*.apk" | grep -v node_modules | head -20

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: |
            **/*.aab
            **/*.apk
          if-no-files-found: warn
