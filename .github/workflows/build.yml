name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'BWEOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          BWEOF

      - name: Init Bubblewrap
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p twa-project
          cp signing.keystore twa-project/signing.keystore

          # 모든 답변을 한줄씩 파일로 작성
          cat > /tmp/answers.txt << ANSWERS
          
          /mobile/
          
          
          
          
          kr.dvsoft.churchcms
          2
          2.0.0
          twa-project/signing.keystore
          dvsoft
          ${KEY_PASSWORD}
          ${KEY_PASSWORD}
          n
          ANSWERS

          bubblewrap init \
            --manifest=https://dvsoft.kr/mobile/manifest.json \
            --directory=twa-project \
            < /tmp/answers.txt

      - name: Check Init Result
        run: |
          echo "=== twa-project 내용 ==="
          ls -la twa-project/

      - name: Build Bubblewrap
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd twa-project
          printf "n\n${KEY_PASSWORD}\n${KEY_PASSWORD}\n" | bubblewrap build

      - name: Find output files
        run: find twa-project -name "*.aab" -o -name "*.apk" | head -20

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: |
            twa-project/**/*.aab
            twa-project/**/*.apk
          if-no-files-found: warn
