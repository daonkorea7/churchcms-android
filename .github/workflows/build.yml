name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build with Bubblewrap
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          mkdir -p twa-project
          cp twa-manifest.json twa-project/twa-manifest.json
          cp signing.keystore twa-project/signing.keystore
          cd twa-project
          printf "n\n${JAVA_HOME}\n" | bubblewrap build \
            --signingKeyPassword=$KEY_PASSWORD \
            --signingKeyStorePassword=$KEY_PASSWORD

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: twa-project/app-release-bundle.aab
