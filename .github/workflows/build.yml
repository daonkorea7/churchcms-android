name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap and expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'BWEOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          BWEOF

      - name: Init and Build with Bubblewrap
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p twa-project
          cp signing.keystore twa-project/signing.keystore

          expect << EXPECTEOF
          set timeout 180
          spawn bubblewrap init --manifest=https://dvsoft.kr/mobile/manifest.json --directory=twa-project
          expect "Package ID" { send "kr.dvsoft.churchcms\r" }
          expect "display name" { send "디바인교회관리\r" }
          expect "launcher name" { send "교회관리\r" }
          expect "theme color" { send "#2c3e52\r" }
          expect "background color" { send "#2c3e52\r" }
          expect "start URL" { send "/mobile/\r" }
          expect "icon URL" { send "https://dvsoft.kr/mobile/icon-512.png\r" }
          expect "maskable" { send "https://dvsoft.kr/mobile/icon-512.png\r" }
          expect "monochrome" { send "\r" }
          expect "application version" { send "2\r" }
          expect "version code" { send "2\r" }
          expect "signing key" { send "twa-project/signing.keystore\r" }
          expect "alias" { send "dvsoft\r" }
          expect "Key Store" { send "$env(KEY_PASSWORD)\r" }
          expect "Key:" { send "$env(KEY_PASSWORD)\r" }
          expect "install" { send "n\r" }
          expect eof
          EXPECTEOF

          cd twa-project
          expect << EXPECTEOF2
          set timeout 180
          spawn bubblewrap build
          expect "regenerate" { send "n\r" }
          expect "Key Store" { send "$env(KEY_PASSWORD)\r" }
          expect "Key:" { send "$env(KEY_PASSWORD)\r" }
          expect eof
          EXPECTEOF2

      - name: Find output files
        run: find twa-project -name "*.aab" -o -name "*.apk" | head -20

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: |
            twa-project/**/*.aab
            twa-project/**/*.apk
          if-no-files-found: warn
