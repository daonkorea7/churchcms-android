name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap and expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Create Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'BWEOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.18-8/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          BWEOF

      - name: Build with Bubblewrap
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p twa-project
          cp twa-manifest.json twa-project/twa-manifest.json
          cp signing.keystore twa-project/signing.keystore
          cd twa-project

          expect << EXPECTEOF
          set timeout 120
          spawn bubblewrap build
          expect "regenerate" { send "n\r" }
          expect "Key Store:" { send "$env(KEY_PASSWORD)\r" }
          expect "Key:" { send "$env(KEY_PASSWORD)\r" }
          expect eof
          EXPECTEOF

      - name: Find output files
        run: |
          echo "=== twa-project 폴더 내용 ==="
          find twa-project -type f | head -30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: |
            twa-project/**/*.aab
            twa-project/**/*.apk
